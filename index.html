<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌面小猫</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            display: grid;
            place-items: center;
            font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        #pet {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }

        #pet.dragging {
            cursor: grabbing;
        }

        #cat {
            position: absolute;
            left: 50%;
            bottom: 8px;
            width: 220px;
            height: 220px;
            object-fit: contain;
            transform: translateX(-50%);
            filter: drop-shadow(0 12px 14px rgba(0, 0, 0, 0.22));
            pointer-events: none;
        }

        #bubble {
            position: absolute;
            left: 50%;
            top: 18px;
            max-width: 180px;
            min-height: 32px;
            padding: 7px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.92);
            color: #2f2f2f;
            font-size: 13px;
            line-height: 18px;
            text-align: center;
            transform: translateX(-50%) translateY(-8px);
            opacity: 0;
            transition: opacity 160ms ease, transform 160ms ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
            pointer-events: none;
        }

        #bubble.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #menu {
            position: absolute;
            right: 12px;
            bottom: 12px;
            display: none;
            min-width: 92px;
            padding: 6px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
        }

        #menu.open {
            display: grid;
            gap: 4px;
        }

        #menu button {
            width: 100%;
            min-height: 30px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: #262626;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
        }

        #menu button:hover {
            background: rgba(0, 0, 0, 0.07);
        }

        #menu .divider {
            width: 100%;
            height: 1px;
            margin: 3px 0;
            background: rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body>
    <main id="pet" aria-label="桌面小猫">
        <div id="bubble"></div>
        <img id="cat" alt="">
        <nav id="menu" aria-label="小猫菜单"></nav>
    </main>
    <script src="renderer.js"></script>
</body>
</html>
